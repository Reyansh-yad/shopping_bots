            z-index: 9999;

        }

            width: 40px;
            height: 40px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transition: transform 0.15s ease-out;
            transform: translate(-50%, -50%);
        }

        input:focus + label,
        input:not(:placeholder-shown) + label {
            transform: translateY(-24px) scale(0.85);
            color: #ffffff;
        }

        .input-underline {
            position: relative;
            border-bottom: 2px solid #444748;
        }

        .input-underline::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 3px;
            background: #ffffff;
            transition: width 0.3s ease;
        }

        input:focus ~ .input-underline::after {
            width: 100%;
        }

        .glitch-hover:hover {
            animation: glitch 0.3s cubic-bezier(.25,.46,.45,.94) both infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>

<script>
        // Custom Cursor Logic
        const dot = document.getElementById('cursor-dot');
        const outline = document.getElementById('cursor-outline');

        window.addEventListener('mousemove', (e) => {
            const posX = e.clientX;
            const posY = e.clientY;

            dot.style.left = `${posX}px`;
            dot.style.top = `${posY}px`;

            outline.animate({
                left: `${posX}px`,
                top: `${posY}px`
            }, { duration: 500, fill: "forwards" });
        });

        // Magnet Effect for Buttons
        const magnetBtns = document.querySelectorAll('.magnet-button');
        magnetBtns.forEach(btn => {
            btn.addEventListener('mousemove', (e) => {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width / 2;
                const y = e.clientY - rect.top - rect.height / 2;
                btn.style.transform = `translate(${x * 0.15}px, ${y * 0.15}px)`;
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = `translate(0, 0)`;
            });
        });

        // Interactive Focus Effect for Cursor
        const inputs = document.querySelectorAll('input, a, button');
        inputs.forEach(el => {
            el.addEventListener('mouseenter', () => {
                outline.style.transform = 'translate(-50%, -50%) scale(1.5)';
                outline.style.borderColor = '#ffffff';
                outline.style.backgroundColor = 'rgba(255,255,255,0.1)';
            });
            el.addEventListener('mouseleave', () => {
                outline.style.transform = 'translate(-50%, -50%) scale(1)';
                outline.style.borderColor = 'rgba(255,255,255,0.5)';
                outline.style.backgroundColor = 'transparent';
            });
        });
    </script>

<script type="module">
import { register } from './api.js';

window.handleSignup = async function(e) {
    e.preventDefault();
    var username = document.getElementById('username').value;
    var password = document.getElementById('password').value;
    var terms = document.getElementById('terms').checked;
    
    if (!terms) {
        alert("Please agree to the Terms of Service.");
        return;
    }
    
    if (username && password) {
        try {
            const data = await register(username, password);
            if (data.status) {
                alert("Account created successfully!");
                window.location.href = 'login.html';
            } else {
                alert(data.message || 'Registration failed');
            }
        } catch (error) {
            alert(error.message || 'Registration error');
        }
    }
}
</script>
