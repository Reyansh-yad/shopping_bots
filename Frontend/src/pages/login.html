<style>
        body {
            background-color: theme('colors.surface-void');
            color: theme('colors.primary');
        }
        
        .glass-panel {
            background: theme('colors.glass-fill');
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid theme('colors.glass-stroke');
        }
        
        /* Input styling overrides */
        input[type="text"], input[type="email"], input[type="password"] {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid theme('colors.glass-stroke');
            border-radius: theme('borderRadius.DEFAULT');
            padding: 12px 16px;
            color: theme('colors.primary');
            transition: all 0.2s ease;
        }
        
        input[type="text"]:focus, input[type="email"]:focus, input[type="password"]:focus {
            box-shadow: none;
            border-color: theme('colors.primary');
            background: rgba(255, 255, 255, 0.05);
            outline: none;
        }
        
        input[type="checkbox"] {
            background: transparent;
            border: 1px solid theme('colors.outline');
            border-radius: 2px;
            height: 16px;
            width: 16px;
        }
        
        input[type="checkbox"]:checked {

            border-color: theme('colors.primary');

<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden bg-surface-void">
<!-- Atmospheric Background Elements -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-40">
<div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-secondary-container rounded-full blur-[140px] mix-blend-screen opacity-50"></div>
<div class="absolute bottom-[-30%] right-[-10%] w-[70%] h-[70%] bg-surface-highest rounded-full blur-[120px] opacity-60"></div>
<div class="absolute top-[40%] left-[60%] w-[30%] h-[30%] bg-brand-dark rounded-full blur-[100px] opacity-30"></div>
</div>
<!-- Login Container -->
<div class="glass-panel w-full max-w-[440px] rounded-xl p-10 z-10 shadow-2xl relative">
<!-- Header -->
<div class="text-center mb-10">
<h1 class="font-headline-md text-[40px] leading-[48px] font-bold text-primary tracking-tight mb-3 font-display-xl">PRC Engine</h1>
<p class="font-body-md text-body-md text-text-muted">Enter the workspace.</p>
</div>
<!-- Form -->
<form action="#" class="space-y-6" id="login-form" method="POST">
<div>
<label class="block font-label-mono text-[11px] tracking-[0.15em] text-text-muted mb-2 uppercase" for="username">Username</label>
<input autocomplete="username" class="block w-full font-label-mono text-sm placeholder:text-surface-highest transition-colors focus:ring-0" id="username" name="username" placeholder="your_username" required="" type="text"/>
</div>
<div>
<label class="block font-label-mono text-[11px] tracking-[0.15em] text-text-muted mb-2 uppercase" for="password">Password</label>
<input autocomplete="current-password" class="block w-full font-label-mono text-sm placeholder:text-surface-highest transition-colors focus:ring-0" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<div class="flex items-center justify-between pt-2 pb-4">
<div class="flex items-center">
<input class="text-primary focus:ring-0 focus:ring-offset-0 transition-colors cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-3 block font-label-mono text-[11px] tracking-[0.1em] text-text-muted cursor-pointer uppercase" for="remember-me">
                        Remember_Me
                    </label>
</div>
<div class="text-sm">
<a class="font-label-mono text-[11px] tracking-[0.1em] text-text-muted hover:text-primary transition-colors uppercase" href="#">
                        Forgot_Password?
                    </a>
</div>
</div>
<div>
<button class="w-full flex justify-center py-4 px-4 rounded bg-primary text-background font-label-mono text-sm tracking-[0.1em] font-bold hover:bg-primary-fixed transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-background focus:ring-primary uppercase shadow-[0_0_15px_rgba(255,255,255,0.2)] hover:shadow-[0_0_25px_rgba(255,255,255,0.4)]" type="submit">
                    Initialize_Session
                </button>
</div>
</form>
<div class="mt-10">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-glass-stroke"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-3 bg-surface-container font-label-mono text-[10px] tracking-[0.2em] text-outline rounded uppercase">Or_Continue_With</span>
</div>
</div>
<div class="mt-6 grid grid-cols-2 gap-4">
<a class="flex justify-center items-center py-3 px-4 border border-glass-stroke rounded font-label-mono text-[11px] tracking-[0.1em] text-primary hover:bg-glass-fill hover:border-outline transition-all duration-200 uppercase group" href="#">
<span class="material-symbols-outlined mr-2 text-[18px] text-text-muted group-hover:text-primary transition-colors" style="font-variation-settings: 'FILL' 0;">login</span>
                    SSO
                </a>
<a class="flex justify-center items-center py-3 px-4 border border-glass-stroke rounded font-label-mono text-[11px] tracking-[0.1em] text-primary hover:bg-glass-fill hover:border-outline transition-all duration-200 uppercase group" href="#">
<span class="material-symbols-outlined mr-2 text-[18px] text-text-muted group-hover:text-primary transition-colors" style="font-variation-settings: 'FILL' 0;">code</span>
                    GitHub
                </a>
</div>
</div>
<div class="mt-10 text-center">
<p class="font-body-md text-sm text-text-muted">
                New analyst? <a class="text-primary hover:text-secondary-fixed transition-colors font-medium border-b border-transparent hover:border-secondary-fixed pb-0.5" href="signup.html">Request access</a>
</p>
</div>
</div>

<script type="module">
    import { login, saveSession } from '../api/api.js';
    
    document.addEventListener('DOMContentLoaded', () => {
        const loginForm = document.getElementById('login-form');

        // Show any auth error passed via URL (e.g. session expired redirect)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('expired')) {
            const errEl = document.createElement('p');
            errEl.className = 'font-label-mono text-[11px] text-secondary-container text-center mt-2';
            errEl.textContent = 'Session expired — please log in again.';
            loginForm.prepend(errEl);
        }
        if (urlParams.get('registered')) {
            const okEl = document.createElement('p');
            okEl.className = 'font-label-mono text-[11px] text-center mt-2';
            okEl.style.color = '#4ade80';
            okEl.textContent = 'Account created! Please log in.';
            loginForm.prepend(okEl);
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = loginForm.querySelector('button[type="submit"]');

            // Clear any previous error
            loginForm.querySelectorAll('.auth-error').forEach(el => el.remove());

            if (!username || !password) {
                const errEl = document.createElement('p');
                errEl.className = 'auth-error font-label-mono text-[11px] text-secondary-container text-center';
                errEl.textContent = 'Username and password are required.';
                btn.parentElement.before(errEl);
                return;
            }

            btn.disabled = true;
            btn.innerText = 'AUTHENTICATING...';
            
            try {
                const data = await login(username, password);
                if (data.status) {
                    saveSession(data.session_id, username);
                    window.location.href = 'dashboard.html';
                } else {
                    const errEl = document.createElement('p');
                    errEl.className = 'auth-error font-label-mono text-[11px] text-secondary-container text-center';
                    errEl.textContent = data.message || 'Login failed';
                    btn.parentElement.before(errEl);
                    btn.disabled = false;
                    btn.innerText = 'Initialize_Session';
                }
            } catch (error) {
                console.error(error);
                const errEl = document.createElement('p');
                errEl.className = 'auth-error font-label-mono text-[11px] text-secondary-container text-center';
                errEl.textContent = error.message || 'Connection error. Is the backend running?';
                btn.parentElement.before(errEl);
                btn.disabled = false;
                btn.innerText = 'Initialize_Session';
            }
        });
    });
    </script>
</body></html>
