<style>

<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden bg-surface-void">
<!-- Atmospheric Background Elements -->
<div class="absolute inset-0 z-0 pointer-events-none opacity-40">
<div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-secondary-container rounded-full blur-[140px] mix-blend-screen opacity-50"></div>
<div class="absolute bottom-[-30%] right-[-10%] w-[70%] h-[70%] bg-surface-highest rounded-full blur-[120px] opacity-60"></div>
<div class="absolute top-[40%] left-[60%] w-[30%] h-[30%] bg-brand-dark rounded-full blur-[100px] opacity-30"></div>
</div>
<!-- Login Container -->
<div class="glass-panel w-full max-w-[440px] rounded-xl p-10 z-10 shadow-2xl relative">
<!-- Header -->
<div class="text-center mb-10">
<h1 class="font-headline-md text-[40px] leading-[48px] font-bold text-primary tracking-tight mb-3 font-display-xl"><a class="hover:text-secondary-fixed transition-colors" href="/">PRC Engine</a></h1>
<p class="font-body-md text-body-md text-text-muted">Enter the workspace.</p>
</div>
<!-- Form -->
<form id="login-form" class="space-y-6">
<div>
<label class="block font-label-mono text-[11px] tracking-[0.15em] text-text-muted mb-2 uppercase" for="email">Email address</label>
<input autocomplete="email" class="block w-full font-label-mono text-sm placeholder:text-surface-highest transition-colors focus:ring-0" id="email" name="email" placeholder="user@prc-engine.com" required="" type="email"/>
</div>
<div>
<label class="block font-label-mono text-[11px] tracking-[0.15em] text-text-muted mb-2 uppercase" for="password">Password</label>
<input autocomplete="current-password" class="block w-full font-label-mono text-sm placeholder:text-surface-highest transition-colors focus:ring-0" id="password" name="password" placeholder="\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022" required="" type="password"/>
</div>
<div class="flex items-center justify-between pt-2 pb-4">
<div class="flex items-center">
<input class="text-primary focus:ring-0 focus:ring-offset-0 transition-colors cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-3 block font-label-mono text-[11px] tracking-[0.1em] text-text-muted cursor-pointer uppercase" for="remember-me">
                        Remember_Me
                    </label>
</div>
<div class="text-sm">
<a class="font-label-mono text-[11px] tracking-[0.1em] text-text-muted hover:text-primary transition-colors uppercase" href="#">
                        Forgot_Password?
                    </a>
</div>
</div>
<div>
<button id="login-submit" class="w-full flex justify-center py-4 px-4 rounded bg-primary text-background font-label-mono text-sm tracking-[0.1em] font-bold hover:bg-primary-fixed transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-background focus:ring-primary uppercase shadow-[0_0_15px_rgba(255,255,255,0.2)] hover:shadow-[0_0_25px_rgba(255,255,255,0.4)]" type="submit">
                    Initialize_Session
                </button>
</div>
<p id="login-error" class="text-secondary-container font-label-mono text-[11px] text-center hidden"></p>
</form>
<div class="mt-10">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-glass-stroke"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-3 bg-surface-container font-label-mono text-[10px] tracking-[0.2em] text-outline rounded uppercase">Or_Continue_With</span>
</div>
</div>
<div class="mt-6 grid grid-cols-2 gap-4">
<a class="flex justify-center items-center py-3 px-4 border border-glass-stroke rounded font-label-mono text-[11px] tracking-[0.1em] text-primary hover:bg-glass-fill hover:border-outline transition-all duration-200 uppercase group" href="/Frontend/src/pages/login.html">
<span class="material-symbols-outlined mr-2 text-[18px] text-text-muted group-hover:text-primary transition-colors" style="font-variation-settings: 'FILL' 0;">login</span>
                    SSO
                </a>
<a class="flex justify-center items-center py-3 px-4 border border-glass-stroke rounded font-label-mono text-[11px] tracking-[0.1em] text-primary hover:bg-glass-fill hover:border-outline transition-all duration-200 uppercase group" href="#">
<span class="material-symbols-outlined mr-2 text-[18px] text-text-muted group-hover:text-primary transition-colors" style="font-variation-settings: 'FILL' 0;">code</span>
                    GitHub
                </a>
</div>
</div>
<div class="mt-10 text-center">
<p class="font-body-md text-sm text-text-muted">
                New analyst? <a class="text-primary hover:text-secondary-fixed transition-colors font-medium border-b border-transparent hover:border-secondary-fixed pb-0.5" href="/Frontend/src/pages/signup.html">Request access</a>
</p>
</div>
</div>
</body>
<script>
(function(){
  const BASE = 'http://localhost:8000';
  const form = document.getElementById('login-form');
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-submit');

  // If already logged in, go straight to dashboard
  if (localStorage.getItem('prc_session_id')) {
    window.location.href = '/Frontend/src/pages/dashboard.html';
    return;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errEl.classList.add('hidden');
    btn.textContent = 'Authenticating...';
    btn.disabled = true;

    const username = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const res = await fetch(BASE + '/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok && data.session_id) {
        localStorage.setItem('prc_session_id', data.session_id);
        localStorage.setItem('prc_username', username);
        // Check if there's a redirect target after login
        const redirect = sessionStorage.getItem('prc_login_redirect') || '/Frontend/src/pages/dashboard.html';
        sessionStorage.removeItem('prc_login_redirect');
        window.location.href = redirect;
      } else {
        errEl.textContent = data.detail || 'Invalid credentials';
        errEl.classList.remove('hidden');
        btn.textContent = 'Initialize_Session';
        btn.disabled = false;
      }
    } catch (err) {
      errEl.textContent = 'Backend offline — is the server running?';
      errEl.classList.remove('hidden');
      btn.textContent = 'Initialize_Session';
      btn.disabled = false;
    }
  });
})();
</script>
