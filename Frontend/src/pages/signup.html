<style type="text/tailwindcss">

<body class="min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop text-primary font-body-md">
<!-- Top Left Brand (Floating outside card) -->
<div class="fixed top-margin-desktop left-margin-desktop hidden md:block">
<h1 class="font-headline-md text-headline-md tracking-tighter"><a class="hover:text-secondary-fixed transition-colors" href="/">PRC Engine</a></h1>
<p class="font-label-mono text-label-mono text-text-muted mt-2">ACCOUNT CREATION</p>
</div>
<!-- Main Signup Card -->
<div class="w-full max-w-[480px] relative z-10">
<!-- Mobile Brand -->
<div class="mb-8 md:hidden text-center">
<h1 class="font-headline-md text-headline-md tracking-tighter"><a class="hover:text-secondary-fixed transition-colors" href="/">PRC Engine</a></h1>
<p class="font-label-mono text-label-mono text-text-muted mt-2">ACCOUNT CREATION</p>
</div>
<div class="glass-panel p-8 md:p-12 relative overflow-hidden">
<!-- Decorative corner accent -->
<div class="absolute top-0 right-0 w-16 h-16 bg-gradient-to-bl from-secondary-container/20 to-transparent pointer-events-none"></div>
<div class="mb-10">
<h2 class="font-headline-md text-headline-md mb-2">Initialize Account</h2>
<p class="text-text-muted font-body-md">Configure your analyst profile for real-time tracking.</p>
</div>
<form id="signup-form" action="#" class="space-y-8" method="POST">
<!-- Name Field -->
<div class="relative group">
<label class="block font-label-mono text-label-mono text-text-muted mb-2 uppercase group-focus-within:text-primary transition-colors" for="fullName">Full Name</label>
<div class="flex items-end">
<span class="material-symbols-outlined text-text-muted mr-3 mb-2 group-focus-within:text-primary transition-colors" style="font-variation-settings: 'FILL' 0;">person</span>
<input class="input-field" id="fullName" name="fullName" placeholder="ALEX MERCER" required="" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="relative group">
<label class="block font-label-mono text-label-mono text-text-muted mb-2 uppercase group-focus-within:text-primary transition-colors" for="email">Email Address</label>
<div class="flex items-end">
<span class="material-symbols-outlined text-text-muted mr-3 mb-2 group-focus-within:text-primary transition-colors" style="font-variation-settings: 'FILL' 0;">mail</span>
<input class="input-field" id="email" name="email" placeholder="ALEX@PRC-ENGINE.COM" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="relative group">
<label class="block font-label-mono text-label-mono text-text-muted mb-2 uppercase group-focus-within:text-primary transition-colors" for="password">Password</label>
<div class="flex items-end">
<span class="material-symbols-outlined text-text-muted mr-3 mb-2 group-focus-within:text-primary transition-colors" style="font-variation-settings: 'FILL' 0;">lock</span>
<input class="input-field" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Confirm Password Field -->
<div class="relative group">
<label class="block font-label-mono text-label-mono text-text-muted mb-2 uppercase group-focus-within:text-primary transition-colors" for="confirmPassword">Confirm Password</label>
<div class="flex items-end">
<span class="material-symbols-outlined text-text-muted mr-3 mb-2 group-focus-within:text-primary transition-colors" style="font-variation-settings: 'FILL' 0;">lock_reset</span>
<input class="input-field" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="btn-primary" type="submit">
<span>Create Account</span>
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-8 pt-6 border-t border-glass-stroke text-center">
<p class="font-label-mono text-label-mono text-text-muted">
                    ALREADY HAVE AN ACCOUNT? 
                    <a class="text-primary hover:text-secondary-container ml-2 transition-colors inline-flex items-center gap-1 group" href="/Frontend/src/pages/login.html">
                        LOGIN
                        <span class="material-symbols-outlined text-[14px] group-hover:translate-x-1 transition-transform" style="font-variation-settings: 'FILL' 0;">login</span>
</a>
</p>
</div>
</div>
<!-- Footer Links -->
<div class="mt-8 flex justify-center gap-6 font-label-mono text-label-mono text-text-muted">
<a class="hover:text-primary transition-colors" href="#">PRIVACY POLICY</a>
<a class="hover:text-primary transition-colors" href="#">TERMS OF SERVICE</a>
</div>
</div>
</body>
<script>
(function(){
  const BASE = 'http://localhost:8000';
  const form = document.getElementById('signup-form');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = form.querySelector('button[type="submit"]');
    const origText = btn.textContent.trim();
    btn.textContent = 'Creating...';
    btn.disabled = true;

    const username = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirmPassword').value;
    const fullName = document.getElementById('fullName') ? document.getElementById('fullName').value.trim() : '';

    if (password !== confirm) {
      alert('Passwords do not match.');
      btn.textContent = origText;
      btn.disabled = false;
      return;
    }

    try {
      const res = await fetch(BASE + '/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, full_name: fullName })
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok && data.status) {
        window.location.href = '/Frontend/src/pages/login.html';
      } else {
        alert(data.detail || 'Registration failed');
        btn.textContent = origText;
        btn.disabled = false;
      }
    } catch (err) {
      alert('Backend offline \u2014 is the server running?');
      btn.textContent = origText;
      btn.disabled = false;
    }
  });
})();
</script>
</html>
